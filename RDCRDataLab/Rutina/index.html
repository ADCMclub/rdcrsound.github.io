<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tracker Maestro 360°</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0e14;font-family:'Courier New',monospace;color:#e8edf2;min-height:100vh}
  button{font-family:'Courier New',monospace;cursor:pointer}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#0d1117}
  ::-webkit-scrollbar-thumb{background:#1e2d40;border-radius:2px}
  @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .35s ease forwards}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// Ordered chronologically matching the PDF schedule
const HABITS = [
  { id:"sinmovil",   icon:"📵", label:"Sin móvil al despertar",   points:10,
    time:"04:55–07:00", tip:"Sin tocar el teléfono los primeros 90 min del día", weekendTime:"04:55–07:00" },
  { id:"oracion",    icon:"🙏", label:"Oración / Devocional",    points:15,
    time:"05:00–05:20", tip:"Ora en voz alta — práctica de oratoria", weekendTime:"06:00–06:30" },
  { id:"ejercicio",  icon:"💪", label:"Ejercicio matutino",       points:15,
    time:"05:20–05:55", tip:"L/X/V fuerza · M/J cardio HIIT", weekendTime:"06:30–07:30" },
  { id:"desayuno",   icon:"🥗", label:"Desayuno proteico",        points:8,
    time:"05:55–06:10", tip:"Huevos + avena. Sin azúcar procesada.", weekendTime:"07:30–08:00" },
  { id:"habilidad",  icon:"🎓", label:"Bloque de habilidad",      points:15,
    time:"06:10–06:45", tip:"L=Audition · M=Datos · X=Oratoria · J=Audition · V=Datos", weekendTime:"08:00–12:00" },
  { id:"video",      icon:"🎬", label:"Grabé video de contenido", points:12,
    time:"20:15–20:50", tip:"1 video 60–90 seg. Tema rotativo por día.", weekendTime:"14:00–16:00" },
  { id:"radio",      icon:"📻", label:"Programa de radio",        points:15,
    time:"21:00–22:00", tip:"Aplica oratoria: pausas, dicción, variación de tono.", weekendTime:"20:00–21:00" },
  { id:"libreta",    icon:"📝", label:"Anotaciones en libreta",   points:8,
    time:"22:00–22:20", tip:"3 cosas que mejoré hoy. Próximo tema de radio.", weekendTime:"21:00–21:30" },
  { id:"movilnoche", icon:"🌙", label:"Móvil fuera del cuarto",   points:10,
    time:"22:20–04:55", tip:"Cargador fuera del cuarto. Sin excepciones.", weekendTime:"22:30–06:00" },
  { id:"suenio",     icon:"😴", label:"Dormí antes de 23:00",     points:10,
    time:"22:40–04:55", tip:"Mínimo 6h para ciclos REM. Cuarto oscuro y frío.", weekendTime:"22:30–06:00" },
];
const DAYS     = ["L","M","X","J","V","S","D"];
const DAY_FULL = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const TOTAL_PTS  = HABITS.reduce((a,h)=>a+h.points,0);
const TOTAL_WEEK = TOTAL_PTS * 7;

const MOTIVATIONS = [
  "🔥 Cada hábito que marcas reescribe quién eres.",
  "⚡ La disciplina que nadie ve construye los resultados que todos admiran.",
  "🏆 El éxito se construye hábito por hábito, día por día.",
  "💎 No hay atajos. Solo consistencia. Tú lo estás haciendo.",
  "🎯 Cada check es una promesa cumplida contigo mismo.",
  "🌟 Los grandes líderes hacen esto en silencio, sin aplausos.",
  "⚔️ Mientras otros duermen, tú construyes tu legado.",
  "🙏 Dios honra a los que se mueven con propósito.",
];

const LEVELS = [
  { min:0,  label:"🌱 Semilla",      color:"#6B7280" },
  { min:20, label:"⚡ Aprendiz",     color:"#3B82F6" },
  { min:40, label:"🔥 Guerrero",     color:"#F97316" },
  { min:60, label:"🏆 Campeón",      color:"#EAB308" },
  { min:80, label:"💎 Élite",        color:"#A855F7" },
  { min:95, label:"👑 MAESTRO 360°", color:"#FFD700" },
];
function getLevel(pct){ let lv=LEVELS[0]; for(const l of LEVELS){if(pct>=l.min)lv=l;} return lv; }

// ── STORAGE ─────────────────────────────────────────────────
function getWeekKey(date){
  const d=date||new Date(), y=d.getFullYear();
  const w=Math.ceil(((d-new Date(y,0,1))/86400000+new Date(y,0,1).getDay()+1)/7);
  return `maestro_week_${y}_${w}`;
}
function saveLocal(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(_){} }
function loadLocal(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(_){return null;} }

function getAllWeeks(currentKey, currentChecks){
  const map={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||!k.startsWith('maestro_week_')) continue;
    const p=k.split('_'); if(p.length<4) continue;
    const y=parseInt(p[2]),w=parseInt(p[3]); if(isNaN(y)||isNaN(w)) continue;
    try{ map[k]={year:y,weekNum:w,data:JSON.parse(localStorage.getItem(k)||'{}')}; }catch(_){}
  }
  map[currentKey]={year:parseInt(currentKey.split('_')[2]),weekNum:parseInt(currentKey.split('_')[3]),data:currentChecks};
  return Object.values(map);
}
function weekThursday(year,wn){
  const jan1=new Date(year,0,1);
  return new Date(jan1.getTime()+((wn-1)*7+3)*86400000);
}
function groupByMonth(allWeeks){
  const map={};
  for(const w of allWeeks){
    const thu=weekThursday(w.year,w.weekNum);
    const mKey=`${thu.getFullYear()}_${thu.getMonth()}`;
    if(!map[mKey]) map[mKey]={year:thu.getFullYear(),month:thu.getMonth(),weeks:[]};
    map[mKey].weeks.push(w);
  }
  return map;
}
function calcWeekStats(data){
  let pts=0;
  for(let d=0;d<7;d++) for(const h of HABITS) if(data[`${d}_${h.id}`]) pts+=h.points;
  return {pts,pct:Math.round((pts/TOTAL_WEEK)*100)};
}
function calcDayStats(data,di){
  let pts=0;
  for(const h of HABITS) if(data[`${di}_${h.id}`]) pts+=h.points;
  return {pts,pct:Math.round((pts/TOTAL_PTS)*100)};
}
function calcMonthStats(mData){
  let pts=0,total=0,habitCount={};
  for(const w of mData.weeks){
    const s=calcWeekStats(w.data); pts+=s.pts; total+=TOTAL_WEEK;
    for(let d=0;d<7;d++) for(const h of HABITS)
      if(w.data[`${d}_${h.id}`]) habitCount[h.id]=(habitCount[h.id]||0)+1;
  }
  return {pts,total,pct:total>0?Math.round((pts/total)*100):0,habitCount,maxPerHabit:mData.weeks.length*7};
}

// ── ATOMS ────────────────────────────────────────────────────
function Ring({pct,size=56,stroke=5,color="#FFD700",small=false}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  return (
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a2030" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color}
          strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:"stroke-dashoffset .6s ease,stroke .3s"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{color:"#fff",fontSize:small?7:size>60?12:9,fontWeight:700,lineHeight:1}}>{Math.round(pct)}%</span>
      </div>
    </div>
  );
}
function Bar({pct,color,h=8}){
  const c=color||(pct>=100?"#00C896":getLevel(pct).color);
  return (
    <div style={{flex:1,height:h,background:"#1a2030",borderRadius:h/2,overflow:"hidden"}}>
      <div style={{height:"100%",width:`${Math.min(pct,100)}%`,borderRadius:h/2,
        background:`linear-gradient(90deg,${c},${c}bb)`,transition:"width .5s ease"}}/>
    </div>
  );
}
function Badge({label,color}){
  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:20,
    background:`${color}22`,border:`1px solid ${color}55`,color,fontSize:10,fontWeight:700}}>{label}</span>;
}
function Confetti({active}){
  if(!active) return null;
  const ps=Array.from({length:40},(_,i)=>({id:i,x:Math.random()*100,
    color:["#FFD700","#1E90FF","#00C896","#FF6B35","#A855F7","#FF4757"][i%6],
    delay:Math.random()*.6,dur:1.2+Math.random()*.9,size:6+Math.random()*8,rot:Math.random()>.5}));
  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,overflow:"hidden"}}>
    {ps.map(p=><div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:"-20px",
      width:p.size,height:p.size,background:p.color,borderRadius:p.rot?"50%":"2px",
      animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`}}/>)}
  </div>;
}
function Toast({msg,visible}){
  return <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
    background:"linear-gradient(135deg,#1a2030,#0d1117)",border:"1px solid #FFD700",
    borderRadius:12,padding:"12px 24px",color:"#FFD700",fontSize:13,fontWeight:700,
    zIndex:9998,opacity:visible?1:0,transition:"opacity .4s",maxWidth:360,textAlign:"center",
    boxShadow:"0 8px 32px rgba(255,215,0,.25)",pointerEvents:"none"}}>{msg}</div>;
}
function NavHeader({children}){
  return <div style={{background:"rgba(255,255,255,.02)",border:"1px solid #1e2d40",
    borderRadius:"0 0 12px 12px",padding:"12px 16px",marginBottom:14}}>{children}</div>;
}
function SectionTitle({children}){
  return <div style={{fontSize:10,color:"#8892a4",letterSpacing:3,textTransform:"uppercase",margin:"14px 0 8px"}}>{children}</div>;
}

// ── TABS ─────────────────────────────────────────────────────
function TabNav({view,setView}){
  return <div style={{display:"flex",gap:4,padding:"14px 16px 0",maxWidth:720,margin:"0 auto"}}>
    {[{id:"week",icon:"📅",label:"SEMANA"},{id:"month",icon:"📆",label:"MES"},{id:"year",icon:"📊",label:"AÑO"},{id:"rutina",icon:"📋",label:"RUTINA"}].map(t=>{
      const a=view===t.id;
      return <button key={t.id} onClick={()=>setView(t.id)} style={{flex:1,padding:"9px 2px",border:"none",
        borderRadius:"8px 8px 0 0",
        background:a?"linear-gradient(180deg,#1a2540,#0f1a2e)":"rgba(255,255,255,.03)",
        color:a?"#FFD700":"#8892a4",fontSize:9,fontWeight:700,letterSpacing:1.5,
        borderBottom:a?"2px solid #FFD700":"2px solid transparent",transition:"all .2s"}}>
        {t.icon} {t.label}
      </button>;
    })}
  </div>;
}

// Returns Date for each day of the current ISO week (Mon–Sun)
function getWeekDates(){
  const now=new Date(), dow=(now.getDay()+6)%7;
  const mon=new Date(now); mon.setDate(now.getDate()-dow); mon.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function fmtShort(d){ return `${d.getDate()} ${MONTHS_ES[d.getMonth()].slice(0,3)}`; }
function fmtFull(d){ return `${d.getDate()} de ${MONTHS_ES[d.getMonth()]} ${d.getFullYear()}`; }

// ── WEEK VIEW ────────────────────────────────────────────────
function WeekView({checks,setChecks,showToast,setConfetti}){
  const todayIdx=(new Date().getDay()+6)%7;
  const [activeDay,setActiveDay]=useState(todayIdx);
  const weekDates=useMemo(()=>getWeekDates(),[]);

  function toggle(day,hid,pts){
    const key=`${day}_${hid}`, was=!!checks[key];
    const nc={...checks,[key]:!was};
    setChecks(nc);
    if(!was){
      const done=HABITS.every(h=>nc[`${day}_${h.id}`]);
      if(done){ setConfetti(true); setTimeout(()=>setConfetti(false),2400);
        showToast(`🎉 ¡${DAY_FULL[day].toUpperCase()} COMPLETADO! +${TOTAL_PTS}pts`);
      } else {
        showToast([`+${pts}pts ⚡ ¡Así se hace!`,`+${pts}pts 🔥 Imparable`,`+${pts}pts 💎 Un paso más`,`+${pts}pts 🏆 ¡Maestro!`][Math.floor(Math.random()*4)]);
      }
    }
  }
  function dp(d){ return HABITS.reduce((s,h)=>s+(checks[`${d}_${h.id}`]?h.points:0),0); }
  function dpct(d){ return Math.round((dp(d)/TOTAL_PTS)*100); }
  function done(d){ return HABITS.every(h=>checks[`${d}_${h.id}`]); }
  const tp=Array.from({length:7},(_,i)=>dp(i)).reduce((a,b)=>a+b,0);
  const wpct=Math.round((tp/TOTAL_WEEK)*100),wlv=getLevel(wpct);
  const dd=Array.from({length:7},(_,i)=>done(i)).filter(Boolean).length;
  const apct=dpct(activeDay),alv=getLevel(apct);

  return <div className="fade-in" style={{maxWidth:720,margin:"0 auto",padding:"0 14px"}}>
    {/* week bar */}
    <div style={{display:"flex",alignItems:"center",gap:12,background:"rgba(255,255,255,.02)",
      border:"1px solid #1e2d40",borderRadius:"0 0 12px 12px",padding:"10px 14px",marginBottom:12}}>
      <Ring pct={wpct} size={50} stroke={5} color={wlv.color}/>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{tp} / {TOTAL_WEEK} pts</div>
          <Badge label={wlv.label} color={wlv.color}/>
        </div>
        <Bar pct={wpct} color={wlv.color}/>
        <div style={{fontSize:9,color:"#8892a4",marginTop:4}}>{dd}/7 días completos ✅</div>
      </div>
    </div>
    {/* day tabs */}
    <div style={{display:"flex",gap:5,marginBottom:10}}>
      {DAYS.map((d,i)=>{
        const pct=dpct(i),dn=done(i),isT=i===todayIdx,isA=i===activeDay,lv=getLevel(pct);
        const dt=weekDates[i];
        return <button key={i} onClick={()=>setActiveDay(i)} style={{flex:1,padding:"7px 2px 5px",border:"none",
          borderRadius:10,background:isA?"linear-gradient(160deg,#1a2540,#0f1a2e)":"rgba(255,255,255,.03)",
          outline:isA?`2px solid ${lv.color}`:isT?"1px solid rgba(255,215,0,.4)":"1px solid #1e2d40",
          transform:isA?"translateY(-2px)":"none",boxShadow:isA?`0 6px 20px ${lv.color}22`:"none",transition:"all .2s"}}>
          <div style={{fontSize:8,color:isT?"#FFD700":"#8892a4",fontWeight:isT?700:400}}>{isT?"HOY":d}</div>
          <div style={{fontSize:11,fontWeight:700,color:isA?lv.color:isT?"#FFD700":"#e8edf2",lineHeight:1,marginTop:2}}>{dt.getDate()}</div>
          <div style={{fontSize:7,color:"#4a5568",lineHeight:1,marginBottom:2}}>{MONTHS_ES[dt.getMonth()].slice(0,3).toUpperCase()}</div>
          <div style={{display:"flex",justifyContent:"center"}}><Ring pct={pct} size={28} stroke={2.5} color={dn?"#00C896":lv.color} small/></div>
          {dn&&<div style={{fontSize:9,marginTop:1}}>✅</div>}
        </button>;
      })}
    </div>
    {/* day header */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      background:"linear-gradient(135deg,#1a2030,#0f1520)",border:`1px solid ${alv.color}33`,
      borderRadius:12,padding:"12px 14px",marginBottom:10}}>
      <div>
        <div style={{fontSize:9,color:"#8892a4",letterSpacing:3,textTransform:"uppercase"}}>
          {activeDay===todayIdx?"⚡ HOY — ":""}{DAY_FULL[activeDay]}</div>
        <div style={{fontSize:13,color:alv.color,fontWeight:700,marginTop:1}}>
          📅 {fmtFull(weekDates[activeDay])}
        </div>
        <div style={{fontSize:17,fontWeight:700,color:"#fff",marginTop:2}}>{dp(activeDay)} / {TOTAL_PTS} pts</div>
        <div style={{marginTop:4}}><Badge label={alv.label} color={alv.color}/></div>
      </div>
      <Ring pct={apct} size={62} stroke={6} color={alv.color}/>
    </div>
    {/* habits */}
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {HABITS.map(h=>{
        const k=`${activeDay}_${h.id}`,ch=!!checks[k];
        const isWeekend = activeDay>=5;
        const displayTime = isWeekend ? h.weekendTime : h.time;
        return <button key={h.id} onClick={()=>toggle(activeDay,h.id,h.points)} style={{
          display:"flex",alignItems:"flex-start",gap:11,padding:"11px 13px",
          border:"none",borderRadius:10,textAlign:"left",width:"100%",transition:"all .2s",
          background:ch?"linear-gradient(135deg,rgba(0,200,150,.15),rgba(0,200,150,.05))":"rgba(255,255,255,.03)",
          outline:ch?"1px solid rgba(0,200,150,.4)":"1px solid #1e2d40",
          transform:ch?"scale(1.01)":"scale(1)",boxShadow:ch?"0 4px 16px rgba(0,200,150,.12)":"none"}}>
          {/* checkbox */}
          <div style={{width:22,height:22,borderRadius:5,flexShrink:0,marginTop:1,
            display:"flex",alignItems:"center",justifyContent:"center",
            background:ch?"#00C896":"transparent",border:`2px solid ${ch?"#00C896":"#2d3748"}`,
            transition:"all .2s",fontSize:12,color:"#0a0e14",fontWeight:900}}>{ch?"✓":""}</div>
          {/* icon */}
          <span style={{fontSize:16,flexShrink:0,marginTop:1}}>{h.icon}</span>
          {/* content */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
              <span style={{fontSize:12,fontWeight:600,color:ch?"#00C896":"#e8edf2",
                textDecoration:ch?"line-through":"none",textDecorationColor:"rgba(0,200,150,.5)",
                transition:"all .2s"}}>{h.label}</span>
              {/* time badge */}
              <span style={{
                display:"inline-flex",alignItems:"center",gap:3,
                padding:"1px 7px",borderRadius:20,fontSize:9,fontWeight:700,flexShrink:0,
                background:ch?"rgba(0,200,150,.15)":"rgba(30,144,255,.12)",
                border:`1px solid ${ch?"rgba(0,200,150,.3)":"rgba(30,144,255,.25)"}`,
                color:ch?"#00C896":"#60a5fa",
              }}>⏰ {displayTime}</span>
            </div>
            {/* tip */}
            <div style={{fontSize:9,color:ch?"rgba(0,200,150,.6)":"#4a5568",marginTop:3,
              fontStyle:"italic",lineHeight:1.4,transition:"all .2s"}}>{h.tip}</div>
          </div>
          {/* points */}
          <div style={{padding:"2px 9px",borderRadius:20,flexShrink:0,fontSize:10,fontWeight:700,marginTop:1,
            background:ch?"rgba(0,200,150,.2)":"rgba(255,255,255,.05)",
            border:`1px solid ${ch?"rgba(0,200,150,.4)":"#2d3748"}`,
            color:ch?"#00C896":"#8892a4",transition:"all .2s"}}>+{h.points}</div>
        </button>;
      })}
    </div>
    {/* week summary */}
    <div style={{marginTop:16,background:"rgba(255,255,255,.02)",border:"1px solid #1e2d40",borderRadius:12,padding:"14px 16px"}}>
      <SectionTitle>📊 Resumen semana</SectionTitle>
      {DAYS.map((d,i)=>{
        const pct=dpct(i),dn=done(i),lv=getLevel(pct);
        const dt=weekDates[i];
        return <div key={i} onClick={()=>setActiveDay(i)} style={{display:"flex",alignItems:"center",gap:9,marginBottom:7,cursor:"pointer"}}>
          <div style={{width:32,flexShrink:0}}>
            <div style={{fontSize:9,fontWeight:i===todayIdx?700:400,
              color:i===activeDay?lv.color:i===todayIdx?"#FFD700":"#8892a4"}}>{d}</div>
            <div style={{fontSize:8,color:"#2d3748",lineHeight:1}}>{dt.getDate()}/{dt.getMonth()+1}</div>
          </div>
          <Bar pct={pct} color={dn?"#00C896":lv.color}/>
          <div style={{width:30,fontSize:9,fontWeight:700,color:lv.color,textAlign:"right"}}>{pct}%</div>
          {dn&&<span style={{fontSize:9}}>🏆</span>}
        </div>;
      })}
    </div>
  </div>;
}

// ── MONTH VIEW ───────────────────────────────────────────────
function MonthView({allWeeksData}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth());
  const monthMap=useMemo(()=>groupByMonth(allWeeksData),[allWeeksData]);
  const mData=monthMap[`${year}_${month}`];
  const stats=useMemo(()=>mData?calcMonthStats(mData):null,[mData]);
  const lv=stats?getLevel(stats.pct):LEVELS[0];
  const isCurrent=year===now.getFullYear()&&month===now.getMonth();

  function prev(){ if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); }
  function next(){
    if(isCurrent) return;
    if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);
  }

  return <div className="fade-in" style={{maxWidth:720,margin:"0 auto",padding:"0 14px"}}>
    <NavHeader>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>

          onMouseOut={e=>{e.currentTarget.style.borderColor="#2d3748";e.currentTarget.style.color="#8892a4";}}>◀</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:17,fontWeight:900,color:"#fff"}}>{MONTHS_ES[month].toUpperCase()} {year}</div>

        <div style={{fontSize:11,marginTop:8,color:"#4a5568"}}>Completa hábitos en SEMANA para ver el avance aquí</div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:16,
        background:"linear-gradient(135deg,#1a2030,#0f1520)",border:`1px solid ${lv.color}33`,

        <Ring pct={stats.pct} size={74} stroke={7} color={lv.color}/>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:"#8892a4",letterSpacing:3,textTransform:"uppercase"}}>Rendimiento del mes</div>
          <div style={{fontSize:19,fontWeight:700,color:"#fff",marginTop:2}}>{stats.pts.toLocaleString()} pts</div>

            <div style={{fontSize:9,color:"#8892a4"}}><span style={{color:"#e8edf2",fontWeight:700}}>{stats.totalDays}</span> días registrados</div>
          </div>
        </div>
      </div>

      <SectionTitle>📅 Desglose por semana</SectionTitle>
      {mData.weeks.sort((a,b)=>a.weekNum-b.weekNum).map((w,wi)=>{
        const ws=calcWeekStats(w.data),wlv=getLevel(ws.pct);
        return <div key={wi} style={{background:"rgba(255,255,255,.02)",border:"1px solid #1e2d40",
          borderRadius:10,padding:"12px 14px",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:"#e8edf2"}}>
              SEMANA {w.weekNum}
              <span style={{color:"#8892a4",fontWeight:400,marginLeft:8,fontSize:9}}>({ws.pts}/{TOTAL_WEEK} pts)</span>
            </div>
            <Badge label={`${ws.pct}% — ${wlv.label}`} color={wlv.color}/>
          </div>
          <div style={{display:"flex",gap:4}}>
            {DAYS.map((d,di)=>{
              const ds=calcDayStats(w.data,di),dlv=getLevel(ds.pct);
              const dn=HABITS.every(h=>w.data[`${di}_${h.id}`]);
              return <div key={di} style={{flex:1,background:dn?"rgba(0,200,150,.1)":"rgba(255,255,255,.03)",
                border:`1px solid ${dn?"rgba(0,200,150,.3)":"#1e2d40"}`,borderRadius:6,padding:"4px 2px",textAlign:"center"}}>
                <div style={{fontSize:7,color:"#8892a4",marginBottom:2}}>{d}</div>
                <Ring pct={ds.pct} size={26} stroke={2.5} color={dn?"#00C896":dlv.color} small/>
                {dn&&<div style={{fontSize:8,marginTop:1}}>✅</div>}
              </div>;
            })}
          </div>
          <div style={{marginTop:7}}><Bar pct={ws.pct} color={wlv.color} h={5}/></div>
        </div>;
      })}

      {/* habit breakdown */}
      <SectionTitle>🎯 Hábitos del mes</SectionTitle>
      <div style={{background:"rgba(255,255,255,.02)",border:"1px solid #1e2d40",borderRadius:12,padding:"14px 16px"}}>
        {HABITS.map(h=>{
          const cnt=stats.habitCount[h.id]||0, max=stats.maxPerHabit;
          const pct=max>0?Math.round((cnt/max)*100):0, lv2=getLevel(pct);
          return <div key={h.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <span style={{fontSize:14,flexShrink:0}}>{h.icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:9,color:"#e8edf2",marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.label}</div>
              <Bar pct={pct} color={lv2.color} h={6}/>
            </div>
            <div style={{fontSize:9,fontWeight:700,color:lv2.color,flexShrink:0,width:44,textAlign:"right"}}>{cnt}/{max}</div>
          </div>;
        })}
      </div>
    </>}
  </div>;
}

// ── YEAR VIEW ────────────────────────────────────────────────
function YearView({allWeeksData}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const monthMap=useMemo(()=>groupByMonth(allWeeksData),[allWeeksData]);

  const mStats=useMemo(()=>Array.from({length:12},(_,m)=>{
    const md=monthMap[`${year}_${m}`];
    if(!md) return {month:m,pct:0,pts:0,weeks:0,has:false};
    const s=calcMonthStats(md);
    return {month:m,pct:s.pct,pts:s.pts,weeks:md.weeks.length,has:true};
  }),[year,monthMap]);

  const active=mStats.filter(m=>m.has);
  const yearPts=active.reduce((a,m)=>a+m.pts,0);
  const avgPct=active.length>0?Math.round(active.reduce((a,m)=>a+m.pct,0)/active.length):0;
  const ylv=getLevel(avgPct);
  const best=active.sort((a,b)=>b.pct-a.pct)[0];
  const isCurrentYear=year===now.getFullYear();

  return <div className="fade-in" style={{maxWidth:720,margin:"0 auto",padding:"0 14px"}}>
    <NavHeader>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>setYear(y=>y-1)} style={{background:"transparent",border:"1px solid #2d3748",
          color:"#8892a4",padding:"5px 14px",borderRadius:8,fontSize:13,transition:"all .2s"}}
          onMouseOver={e=>{e.currentTarget.style.borderColor="#FFD700";e.currentTarget.style.color="#FFD700";}}
          onMouseOut={e=>{e.currentTarget.style.borderColor="#2d3748";e.currentTarget.style.color="#8892a4";}}>◀</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:900,color:"#fff"}}>{year}</div>
          {isCurrentYear&&<div style={{fontSize:9,color:"#FFD700",letterSpacing:2}}>AÑO ACTUAL</div>}
        </div>
        <button onClick={()=>{if(!isCurrentYear)setYear(y=>y+1);}} style={{background:"transparent",
          border:"1px solid #2d3748",color:isCurrentYear?"#2d3748":"#8892a4",
          padding:"5px 14px",borderRadius:8,fontSize:13,cursor:isCurrentYear?"default":"pointer",transition:"all .2s"}}
          onMouseOver={e=>{if(!isCurrentYear){e.currentTarget.style.borderColor="#FFD700";e.currentTarget.style.color="#FFD700";}}}
          onMouseOut={e=>{e.currentTarget.style.borderColor="#2d3748";e.currentTarget.style.color=isCurrentYear?"#2d3748":"#8892a4";}}>▶</button>
      </div>
    </NavHeader>

    {active.length>0&&<>
      {/* year summary */}
      <div style={{display:"flex",alignItems:"center",gap:16,
        background:"linear-gradient(135deg,#1a2030,#0f1520)",border:`1px solid ${ylv.color}33`,
        borderRadius:12,padding:"14px 16px",marginBottom:14}}>
        <Ring pct={avgPct} size={70} stroke={6} color={ylv.color}/>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:"#8892a4",letterSpacing:3,textTransform:"uppercase"}}>Rendimiento anual</div>
          <div style={{fontSize:18,fontWeight:700,color:"#fff",marginTop:2}}>{yearPts.toLocaleString()} pts totales</div>
          <div style={{marginTop:4}}><Badge label={ylv.label} color={ylv.color}/></div>
          <div style={{display:"flex",gap:16,marginTop:8}}>
            <div style={{fontSize:9,color:"#8892a4"}}>Meses activos: <span style={{color:"#e8edf2",fontWeight:700}}>{active.length}/12</span></div>
            {best&&<div style={{fontSize:9,color:"#8892a4"}}>Mejor: <span style={{color:"#FFD700",fontWeight:700}}>{MONTHS_ES[best.month]} {best.pct}%</span></div>}
          </div>
        </div>
      </div>

      {/* bar chart */}
      <SectionTitle>📈 Avance mensual {year}</SectionTitle>
      <div style={{background:"rgba(255,255,255,.02)",border:"1px solid #1e2d40",borderRadius:12,padding:"16px",marginBottom:14}}>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:100,marginBottom:6}}>
          {mStats.map(ms=>{
            const lv=getLevel(ms.pct),isNow=isCurrentYear&&ms.month===now.getMonth();
            const bh=ms.has?Math.max(ms.pct,4):3;
            return <div key={ms.month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",justifyContent:"flex-end",position:"relative"}}>
              {ms.has&&ms.pct>=15&&<div style={{position:"absolute",top:`${100-bh-14}%`,fontSize:6,fontWeight:700,color:lv.color,whiteSpace:"nowrap"}}>{ms.pct}%</div>}
              <div style={{width:"100%",height:`${bh}%`,borderRadius:"3px 3px 0 0",
                background:ms.has?`linear-gradient(180deg,${lv.color},${lv.color}77)`:"#1a2030",
                border:isNow?`1px solid ${lv.color}`:"none",transition:"height .5s ease"}}/>
            </div>;
          })}
        </div>
        <div style={{display:"flex",gap:3}}>
          {mStats.map(ms=>{
            const isNow=isCurrentYear&&ms.month===now.getMonth();
            return <div key={ms.month} style={{flex:1,textAlign:"center",fontSize:6.5,
              color:isNow?"#FFD700":ms.has?"#8892a4":"#2d3748",fontWeight:isNow?700:400}}>
              {MONTHS_ES[ms.month].slice(0,3).toUpperCase()}
            </div>;
          })}
        </div>
      </div>
    </>}

    {/* month cards */}
    <SectionTitle>🗓️ Tarjetas mensuales</SectionTitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:20}}>
      {mStats.map(ms=>{
        const lv=getLevel(ms.pct);
        const isNow=isCurrentYear&&ms.month===now.getMonth();
        const isFuture=isCurrentYear&&ms.month>now.getMonth();
        return <div key={ms.month} style={{
          background:ms.has?"linear-gradient(135deg,#1a2030,#0f1520)":"rgba(255,255,255,.01)",
          border:`1px solid ${isNow?lv.color:ms.has?`${lv.color}44`:"#1e2d40"}`,
          borderRadius:10,padding:"11px 10px",opacity:isFuture?.35:1,
          position:"relative",overflow:"hidden",
        }}>
          {isNow&&<div style={{position:"absolute",top:4,right:6,fontSize:7,color:"#FFD700",fontWeight:700,letterSpacing:1}}>HOY</div>}
          <div style={{fontSize:9,fontWeight:700,color:ms.has?"#e8edf2":"#4a5568",marginBottom:6}}>
            {MONTHS_ES[ms.month].toUpperCase()}
          </div>
          {ms.has ? <>
            <div style={{display:"flex",justifyContent:"center",marginBottom:7}}>
              <Ring pct={ms.pct} size={50} stroke={5} color={lv.color}/>
            </div>
            <div style={{fontSize:8,color:lv.color,fontWeight:700,textAlign:"center",marginBottom:4}}>{lv.label}</div>
            <div style={{fontSize:7,color:"#8892a4",textAlign:"center"}}>{ms.pts.toLocaleString()} pts · {ms.weeks} sem.</div>
            <div style={{marginTop:6}}><Bar pct={ms.pct} color={lv.color} h={4}/></div>
          </> : <div style={{textAlign:"center",padding:"14px 0",fontSize:16,opacity:.2}}>
            {isFuture?"🔒":"📭"}
          </div>}
        </div>;
      })}
    </div>

    {active.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:"#8892a4"}}>
      <div style={{fontSize:40,marginBottom:12}}>📊</div>
      <div style={{fontSize:13}}>Sin datos registrados para {year}</div>
      <div style={{fontSize:11,marginTop:8,color:"#4a5568"}}>Completa hábitos semanales para ver el avance anual</div>
    </div>}
  </div>;
}

// ── APP ROOT ─────────────────────────────────────────────────
function App(){
  const [checks,setChecks]=useState({});
  const [view,setView]=useState("week");
  const [toast,setToast]=useState({msg:"",visible:false});
  const [confetti,setConfetti]=useState(false);
  const [motivIdx,setMotivIdx]=useState(0);
  const toastRef=useRef(null);
  const wk=getWeekKey();

  useEffect(()=>{ const s=loadLocal(wk); if(s) setChecks(s); },[]);
  useEffect(()=>{ saveLocal(wk,checks); },[checks]);
  useEffect(()=>{ const t=setInterval(()=>setMotivIdx(i=>(i+1)%MOTIVATIONS.length),8000); return()=>clearInterval(t); },[]);

  const showToast=useCallback(msg=>{
    if(toastRef.current) clearTimeout(toastRef.current);
    setToast({msg,visible:true});
    toastRef.current=setTimeout(()=>setToast(t=>({...t,visible:false})),2600);
  },[]);

  const allWeeksData=useMemo(()=>getAllWeeks(wk,checks),[checks]);
  const tp=useMemo(()=>{let p=0;for(let d=0;d<7;d++)for(const h of HABITS)if(checks[`${d}_${h.id}`])p+=h.points;return p;},[checks]);
  const wpct=Math.round((tp/TOTAL_WEEK)*100),wlv=getLevel(wpct);

  return <div style={{minHeight:"100vh",paddingBottom:48,
    background:"radial-gradient(ellipse at 20% 10%,rgba(30,144,255,.07) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(255,215,0,.05) 0%,transparent 50%),#0a0e14"}}>
    <Confetti active={confetti}/>
    <Toast msg={toast.msg} visible={toast.visible}/>

    {/* header */}
    <div style={{background:"linear-gradient(180deg,#0d1117,#111827)",
      borderBottom:"1px solid #1e2d40",padding:"14px 20px 0",position:"sticky",top:0,zIndex:100}}>
      <div style={{maxWidth:720,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:10}}>
          <div>
            <div style={{fontSize:9,color:"#8892a4",letterSpacing:4,textTransform:"uppercase",marginBottom:2}}>RUTINA MAESTRO 360°</div>
            <div style={{fontSize:18,fontWeight:900,color:"#fff",letterSpacing:-0.5}}>TRACKER TOTAL</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:11}}>
            <Ring pct={wpct} size={54} stroke={5} color={wlv.color}/>
            <div>
              <div style={{fontSize:9,color:"#8892a4",textTransform:"uppercase",letterSpacing:2}}>Esta semana</div>
              <div style={{fontSize:12,fontWeight:700,color:wlv.color}}>{wlv.label}</div>
              <div style={{fontSize:9,color:"#8892a4",marginTop:1}}>{tp}/{TOTAL_WEEK} pts</div>
            </div>
          </div>
        </div>
        <div style={{padding:"7px 12px",background:"rgba(255,215,0,.06)",border:"1px solid rgba(255,215,0,.15)",
          borderRadius:8,fontSize:10,color:"#FFD700",letterSpacing:.3,marginBottom:10}}>
          {MOTIVATIONS[motivIdx]}
        </div>
      </div>
      <TabNav view={view} setView={setView}/>
    </div>

    <div style={{paddingTop:14}}>
      {view==="week"  &&<WeekView checks={checks} setChecks={setChecks} showToast={showToast} setConfetti={setConfetti}/>}
      {view==="month" &&<MonthView allWeeksData={allWeeksData}/>}
      {view==="year"  &&<YearView  allWeeksData={allWeeksData}/>}
      {view==="rutina"&&<RutinaView/>}
    </div>

    {view==="week"&&<div style={{textAlign:"center",marginTop:18,padding:"0 14px"}}>
      <button onClick={()=>{
        if(!confirm("¿Reiniciar semana actual?")) return;
        setChecks({}); saveLocal(wk,{});
        showToast("🔄 Semana reiniciada. ¡A conquistar de nuevo!");
      }} style={{background:"transparent",border:"1px solid #2d3748",color:"#4a5568",
        fontSize:10,padding:"6px 18px",borderRadius:20,letterSpacing:1,transition:"all .2s"}}
        onMouseOver={e=>{e.currentTarget.style.borderColor="#FF4757";e.currentTarget.style.color="#FF4757";}}
        onMouseOut={e=>{e.currentTarget.style.borderColor="#2d3748";e.currentTarget.style.color="#4a5568";}}>
        ↺ NUEVA SEMANA
      </button>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
