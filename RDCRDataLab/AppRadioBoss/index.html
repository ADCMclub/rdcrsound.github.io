<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RadioSync - Oyentes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            padding: 16px;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            background: #121212;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #2a2a3e;
        }

        .header h1 {
            font-size: 28px;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        .status-badge {
            display: inline-block;
            background: #ff4444;
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            margin-top: 8px;
        }

        .now-playing {
            background: #1e1e2e;
            margin: 16px;
            padding: 16px;
            border-radius: 20px;
        }

        .song-info .label {
            font-size: 12px;
            color: #feca57;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .song-info .title {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-top: 4px;
        }

        .song-info .next {
            font-size: 11px;
            color: #888;
            margin-top: 6px;
        }

        .pedido-form {
            background: #1e1e2e;
            margin: 0 16px 16px 16px;
            padding: 16px;
            border-radius: 20px;
        }

        .pedido-form h4 {
            color: #fff;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .pedido-input-group {
            display: flex;
            gap: 10px;
        }

        .pedido-input-group input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: none;
            background: #2a2a3a;
            color: white;
            font-size: 14px;
        }

        .pedido-input-group input::placeholder {
            color: #666;
        }

        .pedido-input-group button {
            background: #25D366;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .info-card {
            background: #1e1e2e;
            padding: 14px;
            border-radius: 16px;
            text-align: center;
        }

        .info-card .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 8px;
        }

        .info-card .label {
            font-size: 12px;
            color: #aaa;
        }

        .info-card .value {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-top: 4px;
        }

        .metrics {
            display: flex;
            justify-content: space-around;
            background: #1a1a2a;
            margin: 16px;
            padding: 14px;
            border-radius: 20px;
        }

        .metric {
            text-align: center;
            flex: 1;
        }

        .metric .number {
            font-size: 22px;
            font-weight: bold;
            color: #feca57;
        }

        .metric .label {
            font-size: 10px;
            color: #888;
        }

        .section {
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #fff;
            font-weight: bold;
        }

        .messages-container {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .message-item {
            background: #2a2a3a;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 8px;
            border-left: 3px solid #feca57;
        }

        .message-user {
            font-weight: bold;
            color: #feca57;
            font-size: 13px;
        }

        .message-text {
            color: #eee;
            font-size: 14px;
            margin-top: 4px;
            word-break: break-word;
        }

        .message-time {
            font-size: 10px;
            color: #666;
            margin-top: 6px;
        }

        .empty {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #25D366;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Radio<span>Sync</span></h1>
        <p>Tu voz, tu musica</p>
        <div class="status-badge" id="liveStatus">EN VIVO</div>
    </div>

    <div class="now-playing">
        <div class="song-info">
            <div class="label">AHORA SUENA</div>
            <div class="title" id="nowPlaying">Cargando...</div>
            <div class="next" id="nextTrack">Siguiente: Cargando...</div>
        </div>
    </div>

    <div class="pedido-form">
        <h4>Pedir cancion</h4>
        <div class="pedido-input-group">
            <input type="text" id="cancionInput" placeholder="Ej: Bohemian Rhapsody - Queen" autocomplete="off">
            <button id="enviarPedidoBtn">Enviar</button>
        </div>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <div class="icon">☀️</div>
            <div class="label">CLIMA</div>
            <div class="value" id="clima">Cargando...</div>
        </div>
        <div class="info-card">
            <div class="icon">📰</div>
            <div class="label">NOTICIAS</div>
            <div class="value" id="noticias">Cargando...</div>
        </div>
        <div class="info-card">
            <div class="icon">🏷️</div>
            <div class="label">PROMOCIONES</div>
            <div class="value" id="promos">Cargando...</div>
        </div>
        <div class="info-card">
            <div class="icon">🎁</div>
            <div class="label">SORTEOS</div>
            <div class="value" id="sorteos">Cargando...</div>
        </div>
    </div>

    <div class="metrics">
        <div class="metric">
            <div class="number" id="oyentes">0</div>
            <div class="label">OYENTES</div>
        </div>
        <div class="metric">
            <div class="number" id="msgMinuto">0</div>
            <div class="label">MSG/MIN</div>
        </div>
        <div class="metric">
            <div class="number" id="interaccion">0%</div>
            <div class="label">ENGAGEMENT</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">
            <span>Mensajes en vivo</span>
            <span id="msgCount" style="color:#feca57;">0</span>
        </div>
        <div class="messages-container" id="messagesList">
            <div class="empty">Los mensajes apareceran aqui</div>
        </div>
    </div>
</div>

<script>
    // ==================== CONFIGURACION ====================
    // Numero de WhatsApp de la radio (Ecuador)
    const WHATSAPP_NUMBER = "593961480654";
    
    // URL del backend del operador (cambiar por la IP real del servidor)
    const API_URL = "http://192.168.0.105:3000";
    
    // ==================== FUNCIONES ====================
    
    function mostrarToast(mensaje) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = mensaje;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Enviar pedido por WhatsApp REAL
    function enviarPedidoWhatsApp() {
        const input = document.getElementById('cancionInput');
        const cancion = input.value.trim();
        
        if (!cancion) {
            mostrarToast('Escribe el nombre de la cancion');
            return;
        }
        
        // Crear mensaje para WhatsApp
        const mensaje = `Hola, quiero pedir la cancion: "${cancion}"`;
        const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(mensaje)}`;
        
        // Abrir WhatsApp
        window.open(url, '_blank');
        
        // Limpiar input
        input.value = '';
        
        mostrarToast('Redirigiendo a WhatsApp...');
        
        // Registrar el pedido en el servidor (opcional)
        fetch(`${API_URL}/api/pedido`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cancion: cancion, timestamp: Date.now() })
        }).catch(e => console.log('Error registrando pedido:', e));
    }
    
    // Obtener cancion actual desde RadioBOSS
    async function obtenerCancionRadioBOSS() {
        try {
            const url = `http://192.168.0.105:9001/?pass=radio2024&action=playbackinfo`;
            const response = await fetch(url);
            const data = await response.text();
            
            // Parsear XML
            const parser = new DOMParser();
            const xml = parser.parseFromString(data, 'text/xml');
            const track = xml.querySelector('CurrentTrack TRACK');
            
            if (track) {
                const artist = track.getAttribute('ARTIST') || '';
                const title = track.getAttribute('TITLE') || '';
                if (artist && title) {
                    document.getElementById('nowPlaying').innerText = `${artist} - ${title}`;
                } else if (title) {
                    document.getElementById('nowPlaying').innerText = title;
                }
            }
        } catch (error) {
            console.log('Error conectando a RadioBOSS:', error);
            document.getElementById('nowPlaying').innerText = 'Conectando...';
        }
    }
    
    // Obtener playlist (siguiente cancion)
    async function obtenerSiguienteCancion() {
        try {
            const url = `http://192.168.0.105:9001/?pass=radio2024&action=getplaylist2`;
            const response = await fetch(url);
            const data = await response.text();
            
            const parser = new DOMParser();
            const xml = parser.parseFromString(data, 'text/xml');
            const nextTrack = xml.querySelector('Track[Position="1"]');
            
            if (nextTrack) {
                const title = nextTrack.getAttribute('TITLE') || '';
                const artist = nextTrack.getAttribute('ARTIST') || '';
                if (artist && title) {
                    document.getElementById('nextTrack').innerHTML = `Siguiente: ${artist} - ${title}`;
                } else if (title) {
                    document.getElementById('nextTrack').innerHTML = `Siguiente: ${title}`;
                }
            }
        } catch (error) {
            console.log('Error obteniendo playlist');
        }
    }
    
    // Obtener contenido (clima, noticias, promos, sorteos) desde el servidor del operador
    async function obtenerContenido() {
        try {
            const response = await fetch(`${API_URL}/api/contenido`);
            const data = await response.json();
            
            if (data.clima) document.getElementById('clima').innerText = data.clima;
            if (data.noticias) document.getElementById('noticias').innerText = data.noticias;
            if (data.promos) document.getElementById('promos').innerText = data.promos;
            if (data.sorteos) document.getElementById('sorteos').innerText = data.sorteos;
        } catch (error) {
            console.log('Error obteniendo contenido, usando valores por defecto');
            document.getElementById('clima').innerText = '22°C - Soleado';
            document.getElementById('noticias').innerText = 'Bienvenidos a RadioSync';
            document.getElementById('promos').innerText = 'Siguenos en redes';
            document.getElementById('sorteos').innerText = 'Participa ya';
        }
    }
    
    // Obtener mensajes en vivo
    async function obtenerMensajes() {
        try {
            const response = await fetch(`${API_URL}/api/mensajes`);
            const data = await response.json();
            
            const container = document.getElementById('messagesList');
            if (data.mensajes && data.mensajes.length > 0) {
                container.innerHTML = data.mensajes.slice(0, 20).map(m => `
                    <div class="message-item">
                        <div class="message-user">${escapeHtml(m.usuario)}</div>
                        <div class="message-text">${escapeHtml(m.texto)}</div>
                        <div class="message-time">${m.hora || ''}</div>
                    </div>
                `).join('');
                document.getElementById('msgCount').innerText = data.mensajes.length;
            }
        } catch (error) {
            console.log('Error obteniendo mensajes');
        }
    }
    
    // Obtener metricas
    async function obtenerMetricas() {
        try {
            const response = await fetch(`${API_URL}/api/metricas`);
            const data = await response.json();
            
            if (data.oyentes) document.getElementById('oyentes').innerText = data.oyentes;
            if (data.msgPorMinuto) document.getElementById('msgMinuto').innerText = data.msgPorMinuto;
            if (data.engagement) document.getElementById('interaccion').innerText = data.engagement + '%';
        } catch (error) {
            console.log('Error obteniendo metricas');
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== INICIALIZACION ====================
    document.getElementById('enviarPedidoBtn').onclick = enviarPedidoWhatsApp;
    document.getElementById('cancionInput').onkeypress = (e) => {
        if (e.key === 'Enter') enviarPedidoWhatsApp();
    };
    
    // Actualizar cada 5 segundos
    obtenerCancionRadioBOSS();
    obtenerSiguienteCancion();
    obtenerContenido();
    obtenerMensajes();
    obtenerMetricas();
    
    setInterval(obtenerCancionRadioBOSS, 5000);
    setInterval(obtenerSiguienteCancion, 10000);
    setInterval(obtenerMensajes, 3000);
    setInterval(obtenerMetricas, 5000);
    setInterval(obtenerContenido, 10000);
    
    console.log('App de Oyentes iniciada');
    console.log('Numero WhatsApp:', WHATSAPP_NUMBER);
</script>
</body>
</html>
